<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maldivia · Arbejdsflade</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ee;--card:#fffefb;--line:#e9e3d6;--line-2:#f1ecdf;--ink:#2e332e;--mut:#98937f;--forest:#22301f;--gold:#b99a5f;--sea:#7ba7a0;--bad:#c2653f;--ok:#6f9c7c;--blue:#7d9cb5;}
*{box-sizing:border-box;}
body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif;margin:0;background:var(--bg);color:var(--ink);font-size:13px;display:flex;min-height:100vh;}
.pf{font-family:'Playfair Display',Georgia,serif;}
aside{width:196px;background:var(--card);border-right:1px solid var(--line);padding:28px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;}
aside .logo{text-align:center;margin-bottom:30px;}
aside .logo h1{font-family:'Playfair Display',serif;font-size:18px;letter-spacing:7px;margin:0 0 3px;font-weight:500;text-indent:7px;color:var(--forest);}
aside .logo small{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:600;}
aside nav{display:flex;flex-direction:column;margin-top:4px;}
aside nav button{background:none;border:0;color:var(--mut);text-align:left;padding:12px 28px;font-size:12.5px;cursor:pointer;border-left:2px solid transparent;font-family:'Inter',sans-serif;font-weight:500;}
aside nav button:hover{color:var(--forest);}
aside nav button.on{color:var(--forest);border-left-color:var(--gold);background:#faf7f0;font-weight:600;}
aside .foot{margin-top:auto;padding:16px 28px;font-size:10.5px;color:var(--mut);line-height:1.7;}
aside .foot a{color:var(--gold);text-decoration:none;}
main{flex:1;padding:26px 32px;max-width:1280px;}
.pagehead{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.pagehead h2{font-family:'Playfair Display',serif;font-size:27px;font-weight:500;margin:0;color:var(--forest);}
.pagehead .sub{color:var(--mut);font-size:12px;font-style:italic;font-family:'Playfair Display',serif;}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(120,105,75,.04);}
.card h3{font-size:9.5px;letter-spacing:2.2px;text-transform:uppercase;color:var(--mut);margin:0 0 12px;font-weight:700;display:flex;align-items:baseline;gap:8px;}
.card h3 .r{margin-left:auto;font-weight:500;letter-spacing:0;text-transform:none;font-size:11px;}
.grid{display:grid;gap:12px;}
.g2{grid-template-columns:1.55fr 1fr;} .g3{grid-template-columns:repeat(3,1fr);} .g4{grid-template-columns:repeat(4,1fr);} .g6{grid-template-columns:repeat(6,1fr);}
@media(max-width:1000px){.g2,.g3,.g4,.g6{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;position:relative;}
.kpi b{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;display:block;line-height:1.1;color:var(--forest);font-variant-numeric:tabular-nums;}
.kpi span{font-size:9px;color:var(--mut);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;}
.kpi .delta{position:absolute;top:11px;right:13px;font-size:10.5px;font-weight:700;}
.delta.up{color:var(--ok);} .delta.down{color:var(--bad);} .delta.flat{color:var(--mut);}
.kpi.warn b{color:var(--bad);}
.kpi .delta{bottom:12px;top:auto;}
.agent{position:relative;}
.tip{position:absolute;top:9px;right:10px;width:15px;height:15px;border-radius:50%;border:1px solid var(--line);color:var(--mut);font-size:9.5px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;cursor:help;font-family:'Inter',sans-serif;background:var(--card);z-index:2;}
.tip:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
.tipbox{position:absolute;z-index:60;top:28px;right:6px;width:225px;background:var(--forest);color:#f4efe4;padding:10px 12px;border-radius:9px;font-size:11.5px;line-height:1.55;letter-spacing:0;text-transform:none;font-weight:400;box-shadow:0 8px 24px rgba(34,48,31,.22);opacity:0;visibility:hidden;transform:translateY(-3px);transition:opacity .12s,transform .12s;pointer-events:none;}
.tip:hover + .tipbox{opacity:1;visibility:visible;transform:translateY(0);}
.tipbox b{color:var(--gold);font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;color:var(--mut);font-size:9px;text-transform:uppercase;letter-spacing:1.4px;padding:5px 7px;border-bottom:1px solid var(--line);font-weight:700;}
th.r,td.r{text-align:right;}
td{padding:7px;border-bottom:1px solid var(--line-2);font-variant-numeric:tabular-nums;}
tr.click{cursor:pointer;} tr.click:hover td{background:#faf6ec;}
.badge{font-size:8.5px;font-weight:700;border-radius:4px;padding:2.5px 8px;color:#fff;background:var(--ok);white-space:nowrap;letter-spacing:1px;text-transform:uppercase;}
.badge.bekraeftet{background:#a8a28c;} .badge.bb_sendt{background:var(--gold);} .badge.klar_til_afrejse{background:var(--blue);}
.badge.god_tur{background:var(--sea);} .badge.faerdig{background:#5b6157;} .badge.canx,.badge.voided{background:var(--bad);}
input,select,textarea{font:inherit;border:1px solid var(--line);border-radius:7px;padding:8px 11px;width:100%;background:#fff;color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:2px solid #eadfc6;border-color:var(--gold);}
label{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--mut);display:block;margin:10px 0 4px;font-weight:700;}
.row{display:flex;gap:11px;} .row>div{flex:1;}
button.btn{background:var(--forest);color:#f7f4ee;border:0;border-radius:7px;padding:10px 18px;cursor:pointer;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;font-family:'Inter',sans-serif;}
button.btn:hover{background:#31432c;}
button.btn.gold{background:var(--gold);} button.btn.gold:hover{background:#a3874e;}
button.btn.ghost{background:#fff;color:var(--forest);border:1px solid var(--line);} button.btn.ghost:hover{border-color:var(--gold);color:var(--gold);}
button.btn.danger{background:var(--bad);}
.pill{display:inline-block;border:1px solid var(--line);border-radius:6px;padding:3px 11px;font-size:11.5px;margin:2px 5px 2px 0;background:#fff;}
.muted{color:var(--mut);font-size:11.5px;}
#login{max-width:390px;margin:11vh auto;}
.center{text-align:center;}
.err{color:var(--bad);font-size:12px;margin-top:8px;min-height:15px;}
.ok{color:var(--ok);}
dialog{border:1px solid var(--line);border-radius:12px;padding:24px 28px;max-width:740px;width:94%;background:var(--card);color:var(--ink);}
dialog::backdrop{background:rgba(46,51,46,.4);}
.el-item{border:1px solid var(--line);border-radius:8px;padding:12px 15px;margin-bottom:8px;background:#fff;}
.el-item b{font-size:13px;color:var(--forest);}
.list-item{display:flex;gap:9px;padding:7.5px 2px;border-bottom:1px solid var(--line-2);align-items:baseline;cursor:pointer;}
.list-item:last-child{border-bottom:none;}
.list-item:hover{background:#faf6ec;}
.list-item .ic{flex:0 0 14px;text-align:center;color:var(--gold);font-size:9px;}
.list-item .when{margin-left:auto;font-size:10.5px;color:var(--mut);white-space:nowrap;font-variant-numeric:tabular-nums;}
.news .item{display:flex;gap:12px;padding:9px 2px;border-bottom:1px solid var(--line-2);align-items:baseline;}
.news .item:last-child{border-bottom:none;}
.news .num{font-family:'Playfair Display',serif;font-size:19px;color:var(--gold);min-width:20px;line-height:1;}
.news a.hl{font-family:'Playfair Display',serif;font-size:14.5px;color:var(--forest);text-decoration:none;font-weight:600;}
.news a.hl:hover{color:var(--gold);}
.news p{margin:2px 0 0;font-size:11.5px;color:#6d6a5c;line-height:1.45;}
.news .src{font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);font-weight:700;}
/* ── Morgenbrief (v0.4 · rene menupunkter) ── */
.brief-lead{font-size:12px;line-height:1.55;color:var(--mut);margin:0 0 14px;}
.brief-lead a{font-weight:600;white-space:nowrap;}
.brief-sec{margin-bottom:13px;}
.brief-sec:last-child{margin-bottom:0;}
.brief-sec-h{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--mut);font-weight:700;margin:0 0 3px;display:flex;align-items:baseline;gap:7px;}
.brief-sec-h .n{color:var(--gold);font-weight:700;}
.brief-item{display:flex;gap:10px;padding:6.5px 2px;border-bottom:1px solid var(--line-2);align-items:baseline;font-size:12.5px;line-height:1.45;}
.brief-item:last-child{border-bottom:none;}
.brief-item.click{cursor:pointer;}
.brief-item.click:hover{background:#faf6ec;}
.brief-item .ic{color:var(--gold);flex:0 0 13px;text-align:center;font-size:10px;}
.brief-item .tx{flex:1;}
.brief-item .when{margin-left:auto;font-size:10.5px;color:var(--mut);white-space:nowrap;font-variant-numeric:tabular-nums;padding-left:8px;}
.brief-rev{display:flex;align-items:baseline;gap:9px;padding:8px 2px 2px;}
.brief-rev b{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--forest);font-variant-numeric:tabular-nums;}
.brief-more{font-size:11.5px;color:var(--mut);margin:4px 0 0;}
.brief-empty{font-size:11.5px;color:var(--mut);margin:0;}
/* ── Flyfakturaer (foldbar boks · Billetkontoret) ── */
.finvbox{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:6px 0 18px;}
.finv{border-top:1px solid var(--line);}
.finv:first-child{border-top:none;}
.finv>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;padding:10px 13px;font-size:12px;}
.finv>summary:hover{background:var(--bg);}
.finv>summary::-webkit-details-marker{display:none;}
.finv>summary::before{content:'▸';color:var(--gold);font-size:10px;flex:none;}
.finv[open]>summary::before{content:'▾';}
.finv>summary .fitot{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums;padding-left:12px;}
.finv .finbody{padding:2px 13px 12px 34px;}
.finv-total{display:flex;padding:10px 13px;font-size:12px;font-weight:700;background:var(--bg);border-top:1px solid var(--line);}
.agent{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px;}
.agent .nm{font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut);font-weight:700;}
.agent .st{font-family:'Playfair Display',serif;font-size:15px;margin:4px 0 1px;color:var(--forest);font-weight:600;}
.agent .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;}
.dot.ok{background:var(--ok);} .dot.warn{background:var(--gold);} .dot.alarm{background:var(--bad);} .dot.off{background:#cfc9b8;}
.agent .info{font-size:10.5px;color:var(--mut);}
.task-line{display:flex;gap:9px;align-items:center;padding:6.5px 0;border-bottom:1px solid var(--line-2);}
.task-line:last-child{border-bottom:none;}
.task-line input[type=checkbox]{width:14px;height:14px;accent-color:var(--forest);}
.task-line .tt{flex:1;cursor:pointer;} .task-line .tt:hover{color:var(--gold);}
.overdue{color:var(--bad);font-weight:700;}
.bar{height:7px;border-radius:4px;background:var(--line-2);overflow:hidden;min-width:50px;}
.bar i{display:block;height:100%;background:var(--gold);border-radius:4px;}
.bar i.sea{background:var(--sea);} .bar i.forest{background:#5b7a54;}
.mini{font-size:10.5px;color:var(--mut);}
a{color:var(--gold);}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-left:auto;}
.seg button{background:#fff;border:0;padding:5px 12px;font-size:11px;cursor:pointer;color:var(--mut);font-family:inherit;}
.seg button.on{background:var(--forest);color:#fff;}
.inuse-row{display:flex;gap:14px;padding:9px 3px;border-bottom:1px solid var(--line-2);align-items:baseline;}
.inuse-row:last-child{border-bottom:none;}
.inuse-row.shared{background:#faf6ec;border:1px solid #ecdfbf;border-radius:8px;padding:9px 11px;margin-bottom:4px;}
.inuse .il{flex:0 0 42%;display:flex;gap:7px;align-items:baseline;flex-wrap:wrap;}
.inuse .il b{color:var(--forest);font-size:13px;}
.inuse .ir{flex:1;display:flex;flex-direction:column;gap:2px;}
.inuse a.cust{text-decoration:none;color:var(--ink);font-size:12px;}
.inuse a.cust:hover{color:var(--gold);}
.eltag{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;padding:2px 6px;color:#fff;background:#a8a28c;white-space:nowrap;}
.eltag.t-hotel{background:var(--sea);} .eltag.t-flight{background:var(--blue);} .eltag.t-transfer{background:var(--gold);} .eltag.t-ticket{background:#8a7bb0;}
.sharedbadge{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8a6d2f;border:1px solid var(--gold);border-radius:4px;padding:2px 6px;background:#fff;}
.vpsel{padding:4px 6px;font-size:11px;width:auto;min-width:140px;border-radius:6px;}
.vpsel.vp-aaben{border-color:var(--line);color:var(--mut);} 
.vpsel.vp-betalt_mangler_afstemning{border-color:var(--gold);color:#8a6d2f;background:#fffdf6;font-weight:600;}
.vpsel.vp-afstemt{border-color:var(--ok);color:var(--ok);background:#f4f9f5;font-weight:600;}
/* ── v0.8 dashboard-oprydning ── */
.subhead{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--mut);font-weight:700;margin:14px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--line-2);}
.card>.subhead:first-of-type{margin-top:4px;}
.elmeta{display:block;font-size:10.5px;color:var(--sea);margin-top:1px;}
.flymeta{display:inline-block;font-size:11px;color:var(--blue);font-weight:600;margin-top:1px;}
.agent.agentfold{padding:0;overflow:hidden;}
.agentfold>summary{list-style:none;cursor:pointer;padding:11px 14px 25px;position:relative;}
.agentfold>summary::-webkit-details-marker{display:none;}
.agentfold>summary::after{content:'▸ fold ud';position:absolute;left:14px;bottom:8px;font-size:8.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);font-weight:700;}
.agentfold[open]>summary::after{content:'▾ fold ind';}
.agentfold>summary:hover::after{text-decoration:underline;}
.agentfold .foldbody{padding:9px 14px 12px;border-top:1px solid var(--line-2);background:#fdfbf6;}
.foldgrp{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut);font-weight:700;margin:9px 0 3px;}
.foldgrp:first-child{margin-top:0;}
.foldrow{display:flex;gap:9px;padding:5px 2px;border-bottom:1px solid var(--line-2);align-items:baseline;font-size:12px;line-height:1.4;}
.foldrow:last-child{border-bottom:none;}
.foldrow .tx{flex:1;}
.foldrow .amt{margin-left:auto;font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:8px;font-size:11px;}
.foldlink{margin:9px 0 0;font-size:11px;}
.fold-up{margin-top:10px;border-top:1px solid var(--line-2);padding-top:7px;}
.fold-up>summary{list-style:none;cursor:pointer;font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);font-weight:700;padding:3px 0;}
.fold-up>summary::-webkit-details-marker{display:none;}
.fold-up>summary::before{content:'▸ ';}
.fold-up[open]>summary::before{content:'▾ ';}
/* ── v0.9: nationalitet + live + omsætnings-panel ── */
.natsub{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:9px 0 2px;}
.natsub:first-of-type{margin-top:3px;}
.livedot{color:#5b7a54;font-size:9.5px;font-weight:700;letter-spacing:1px;margin-left:10px;white-space:nowrap;}
.rev-card{position:relative;}
.rev-lead{font-size:12.5px;margin:9px 0 2px;color:var(--forest);line-height:1.5;}
.rev-lead b{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--forest);font-variant-numeric:tabular-nums;}
.rev-h{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--mut);font-weight:700;margin:17px 0 8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.rev-leg{font-size:9px;letter-spacing:0;text-transform:none;font-weight:400;color:var(--mut);display:inline-flex;align-items:center;gap:4px;}
.rev-leg .sw{width:10px;height:10px;border-radius:3px;display:inline-block;}
.rev-leg .sw-real{background:#5b7a54;}
.rev-leg .sw-rest{background:#e3d5b0;margin-left:8px;}
.rev-rows{display:flex;flex-direction:column;gap:9px;}
.rev-row{display:grid;grid-template-columns:108px 1fr auto;align-items:center;gap:13px;font-size:12px;}
.rev-row .rl{color:var(--ink);font-weight:600;display:flex;align-items:center;gap:6px;}
.rev-row .rb{position:relative;height:14px;border-radius:7px;background:#f2eee1;overflow:hidden;}
.rev-row .rb-tot{position:absolute;left:0;top:0;height:100%;background:#e3d5b0;border-radius:7px;}
.rev-row .rb-real{position:absolute;left:0;top:0;height:100%;background:#5b7a54;border-radius:7px;}
.rev-row .rv{white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--mut);text-align:right;}
.rev-row .rv b{color:var(--forest);margin-left:5px;}
.qnow{font-size:8px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;border:1px solid var(--gold);border-radius:4px;padding:1px 4px;}
/* ── Rapporter ── */
.rep-layout{display:grid;grid-template-columns:212px 1fr;gap:16px;align-items:start;}
.rep-menu{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px;position:sticky;top:16px;}
.rep-grp{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);padding:12px 10px 5px;}
.rep-item{display:block;width:100%;text-align:left;background:none;border:0;padding:8px 10px;border-radius:7px;font:inherit;font-size:12px;color:var(--ink);cursor:pointer;}
.rep-item:hover{background:#faf7f0;}
.rep-item.on{background:var(--forest);color:#fff;font-weight:600;}
.rep-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:12px;}
.rep-toolbar label{display:block;font-size:10px;color:var(--mut);margin-bottom:2px;}
.rep-toolbar input,.rep-toolbar select{font:inherit;font-size:12px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;}
.exp-btns{margin-left:auto;display:flex;gap:6px;}
.exp-btns .btn{padding:7px 12px;font-size:11.5px;}
.rep-meta{font-size:11px;color:var(--mut);margin:2px 0 10px;}
table.rep td.num,table.rep th.num{text-align:right;font-variant-numeric:tabular-nums;}
table.rep tfoot td{border-top:2px solid var(--line);font-weight:700;}
.print-only{display:none;}
@media print{
  body>aside,.rep-menu,.rep-toolbar,#printhint{display:none!important;}
  body{display:block;background:#fff;}
  main#app{padding:0!important;}
  .rep-layout{display:block;}
  .card{border:0;box-shadow:none;padding:0;}
  table.rep{font-size:10px;width:100%;}
  .print-only{display:block!important;}
}
/* ═══ HENVENDELSER · pipeline-board ═══ */
.board{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 12px;align-items:flex-start;}
.col{flex:0 0 224px;background:#faf7f0;border:1px solid var(--line);border-radius:10px;padding:8px;min-height:80px;transition:background .12s,border-color .12s;}
.col.drop{background:#f2ead6;border-color:var(--gold);}
.col-h{display:flex;align-items:baseline;gap:6px;margin:2px 4px 8px;}
.col-h .nm{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);font-weight:700;line-height:1.3;}
.col-h .ct{margin-left:auto;font-size:9px;font-weight:700;color:var(--gold);background:#fff;border:1px solid var(--line);border-radius:20px;padding:1px 7px;}
.col-h .sum{width:100%;font-size:9.5px;color:var(--mut);margin:1px 4px 0;font-variant-numeric:tabular-nums;}
.lead-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 2px rgba(120,105,75,.05);border-left:3px solid var(--gold);}
.lead-card:hover{border-color:var(--gold);box-shadow:0 3px 10px rgba(120,105,75,.12);}
.lead-card.drag{opacity:.4;}
.lead-card .nm{font-weight:600;color:var(--forest);font-size:12.5px;line-height:1.25;}

const vpName = v => v.replace(/\s*\([^)]*\)\s*$/,'');
const fmtFX = (n,cur)=> (n<0?'-':'') + Math.abs(n).toLocaleString('da-DK',{maximumFractionDigits:0}) + (cur?' '+cur:'');
const fmtDkkR = n => (n<0?'-':'') + Math.abs(Math.round(n)).toLocaleString('da-DK') + ' kr';
function vpCurSum(list){ const m={}; list.forEach(p=>{m[p.cur]=(m[p.cur]||0)+p.vendorAmt;}); return Object.entries(m).map(([c,n])=>fmtFX(n,c)).join(' · '); }
function vpCredits(){
  const byV={}; VENDOR_PAYMENTS.forEach(p=>{(byV[p.vendor]=byV[p.vendor]||[]).push(p);});
  const out=[];
  Object.entries(byV).forEach(([v,ps])=>{
    const credits=ps.filter(p=>p.dkk<0); if(!credits.length) return;
    const upcoming=ps.filter(p=>p.dkk>0).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
    out.push({vendor:v,credits,upcoming,totalDkk:credits.reduce((s,c)=>s+c.dkk,0)});
  });
  return out.sort((a,b)=>a.totalDkk-b.totalDkk);
}
function vpTripId(p){ return (window.VP_REFMAP||{})[p.branch+p.folder] || (window.VP_REFMAP||{})[p.folder] || null; }
function vpRow(p){
  const t0=today(); const overdue = p.due && p.due<=t0;
  const id=vpTripId(p); const st=vpStatus(p); const paid=st!=='aaben';

}
function renderVP(mode){

  const t0=today(), t30=plusDays(30);
  let list=VENDOR_PAYMENTS.filter(p=>p.dkk>0 && vpStatus(p)==='aaben').sort((a,b)=>(a.due||'').localeCompare(b.due||''));

}

}

    <p class="muted">Kun teamets e-mailadresser får adgang til data.</p></div>`;
  const msg=(t,ok)=>{const e=$('#autherr');e.className=ok?'err ok':'err';e.textContent=t;};
  const creds=()=>{const fd=new FormData(document.getElementById('loginform'));return{email:String(fd.get('email')||'').trim().toLowerCase(),password:String(fd.get('password')||'')};};
  document.getElementById('loginform').addEventListener('submit', async ev=>{
    ev.preventDefault(); const c=creds();
    if(!c.email||!c.password) return msg('Udfyld både e-mail og kodeord.');
    msg('Logger ind…',true);
    const {error}=await db.auth.signInWithPassword(c);
    if(error) msg(/invalid/i.test(error.message)?'Forkert e-mail eller kodeord.':/confirm/i.test(error.message)?'E-mail ikke bekræftet — sig til Claude.':error.message);
  });
  // Selv-registrering er fjernet (v0.7): nye brugere oprettes af en admin på Brugere-siden,
  // som også opretter login'et og udleverer et engangskodeord.
  document.getElementById('forgotbtn').addEventListener('click', async ()=>{
    const c=creds();
    if(!c.email) return msg('Skriv din e-mail i feltet ovenfor, tryk så «Glemt kodeord?».');
    msg('Sender link…',true);
    const {error}=await db.auth.resetPasswordForEmail(c.email, {redirectTo: location.origin+location.pathname});
    msg(error?error.message:'Vi har sendt et link til '+c.email+'. Åbn mailen og vælg et nyt kodeord (tjek evt. spam-mappen).',!error);
  });
}
function changePassword(){
  if(document.getElementById('cpoverlay')) return;
  const ov=document.createElement('div');
  ov.id='cpoverlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(34,48,31,.35);display:flex;align-items:center;justify-content:center;z-index:9999';
  ov.innerHTML=`<div class="card" style="width:360px;max-width:92vw;margin:0">
    <h3 style="margin-top:0">Skift kodeord</h3>
    <label for="cpw1">Nyt kodeord</label><input id="cpw1" type="password" autocomplete="new-password" minlength="6">
    <label for="cpw2">Gentag nyt kodeord</label><input id="cpw2" type="password" autocomplete="new-password" minlength="6">
    <div class="err" id="cperr" style="margin-top:8px"></div>
    <div class="row" style="margin-top:14px">
      <button class="btn" id="cpsave" type="button">Gem</button>
      <button class="btn ghost" id="cpcancel" type="button">Annullér</button>
    </div>
    <p class="muted" style="margin-bottom:0">Mindst 6 tegn.</p></div>`;
  document.body.appendChild(ov);
  const err=(t,ok)=>{const e=ov.querySelector('#cperr');e.className=ok?'err ok':'err';e.textContent=t;};
  const close=()=>ov.remove();
  ov.addEventListener('click', e=>{ if(e.target===ov) close(); });
  ov.querySelector('#cpcancel').onclick=close;
  ov.querySelector('#cpw1').focus();
  ov.querySelector('#cpsave').onclick=async()=>{
    const p1=ov.querySelector('#cpw1').value, p2=ov.querySelector('#cpw2').value;
    if(p1.length<6) return err('Kodeordet skal være mindst 6 tegn.');
    if(p1!==p2) return err('De to kodeord er ikke ens.');
    err('Gemmer…',true);
    const {error}=await db.auth.updateUser({password:p1});
    if(error) return err(error.message);
    err('Kodeord ændret ✓ — brug det næste gang du logger ind.',true);
    setTimeout(close,1600);
  };
}

// ── v0.9: live auto-opdatering via Supabase Realtime ──
window.__view='dash';
let __rtChan=null,__rtTimer=null,__dashStale=false;
function scheduleDashRefresh(){
  if(window.__view!=='dash')return;
  if(document.visibilityState!=='visible'){__dashStale=true;return;}
  clearTimeout(__rtTimer); __rtTimer=setTimeout(()=>{ if(window.__view==='dash')viewDash(); },1200);
}
function setupRealtime(){
  if(__rtChan)return;
  try{
    __rtChan=db.channel('dash-live')
      .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},scheduleDashRefresh)
      .on('postgres_changes',{event:'*',schema:'public',table:'trips'},scheduleDashRefresh)
      .on('postgres_changes',{event:'*',schema:'public',table:'trip_elements'},scheduleDashRefresh)
      .subscribe();
    document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&window.__view==='dash'&&__dashStale){__dashStale=false;viewDash();} });
  }catch(e){ console.warn('realtime setup fejlede',e); }
}

function findOverlaps(trips, horizonDays){
  const t0 = today(), tH = plusDays(horizonDays);
  const rel = trips.filter(t => active(t) && t.return_date && t.departure_date <= tH && t.return_date >= t0);
  const clusters = [];
  for(let i=0;i<rel.length;i++) for(let j=i+1;j<rel.length;j++){
    const a=rel[i], b=rel[j];
    const shared = a.trip_destinations.map(d=>d.destination).filter(d=>b.trip_destinations.some(x=>x.destination===d));
    if(!shared.length) continue;
    if(a.departure_date <= b.return_date && b.departure_date <= a.return_date){
      const from = a.departure_date>b.departure_date?a.departure_date:b.departure_date;
      const to = a.return_date<b.return_date?a.return_date:b.return_date;
      let c = clusters.find(c=>c.dest===shared[0] && c.trips.some(t=>t.id===a.id||t.id===b.id) && c.from<=to && from<=c.to);
      if(c){ if(!c.trips.some(t=>t.id===a.id))c.trips.push(a); if(!c.trips.some(t=>t.id===b.id))c.trips.push(b); c.from=c.from<from?c.from:from; c.to=c.to>to?c.to:to; }
      else clusters.push({dest:shared[0], from, to, trips:[a,b]});
    }
  }
  return clusters.sort((x,y)=>x.from.localeCompare(y.from));
}

 {group:'Myndighedsindberetning', items:[

const fmtKr = n => (Math.round((+n||0)*100)/100).toLocaleString('da-DK',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => (Math.round((+n||0)*10)/10).toLocaleString('da-DK',{minimumFractionDigits:1,maximumFractionDigits:1})+' %';
const fmtNum = n => (+n||0).toLocaleString('da-DK');
function fmtCell(v,type){ if(v==null||v==='')return ''; if(type==='kr')return fmtKr(v); if(type==='kr0')return fmtNum(Math.round(v)); if(type==='pct')return fmtPct(v); if(type==='num')return fmtNum(v); if(type==='date')return fmtDY(v); return String(v);}
const rightAligned = type => type==='kr'||type==='kr0'||type==='pct'||type==='num';

function detailCard(detail){
  const grp={}; detail.forEach(d=>{(grp[d.land]=grp[d.land]||[]).push(d);});
  const flag=d=>d.udg===0?' title="Ingen leverandøromkostning registreret" style="color:#b45309"':(d.ind<d.udg?' title="Indtægt < udgift (depositum/negativ margin?)" style="color:#b45309"':'');
  const sec=Object.keys(grp).sort().map(land=>{
    const ds=grp[land]; const si=ds.reduce((s,d)=>s+d.ind,0), su=ds.reduce((s,d)=>s+d.udg,0);
    const navn=UHT_LANDNAVN[land]||land;
    return `<tr class="rep-grp-row"><td colspan="6"><b>${land}</b> · ${navn} <span class="mini muted">(${ds.length} rejser)</span></td></tr>`+
      ds.map(d=>`<tr${flag(d)}><td>${d.ref}</td><td>${d.branch}</td><td>${d.kunde}</td><td>${fmtDY(d.afrejse)}</td><td class="num">${fmtNum(d.ind)}</td><td class="num">${fmtNum(d.udg)}</td></tr>`).join('')+
      `<tr class="rep-sub"><td colspan="4" class="num"><b>Subtotal ${land}</b></td><td class="num"><b>${fmtNum(si)}</b></td><td class="num"><b>${fmtNum(su)}</b></td></tr>`;
  }).join('');
  return `<div class="card"><h3 style="margin-top:0">Specifikation — rejser bag tallene <span class="r mini">${detail.length} afrejser</span></h3>
    <div class="rep-meta">Hver linje = én rejse (afrejse i perioden). Beløb i hele kr. Gule linjer bør tjekkes: manglende udgift eller udgift &gt; indtægt.</div>
    <div style="overflow-x:auto"><table class="rep"><thead><tr><th>Ref.nr.</th><th>Branch</th><th>Kunde</th><th>Afrejse</th><th class="num">Indtægter</th><th class="num">Udgifter</th></tr></thead><tbody>${sec}</tbody></table></div></div>`;
}

// —— eksportører (genbrugelige) ——
function repFilename(ext){ const rep=REP_STATE.last.rep; const p=rep.period?`_${REP_STATE.from}_${REP_STATE.to}`:''; return `Maldivia_${rep.id}${p}.${ext}`; }
function repMatrix(){ // [{columns,rows,footer}] -> AoA med rå tal (Excel-venligt)
  const {rep,res}=REP_STATE.last; const cols=res.columns;
  const header=cols.map(c=>c.label);
  const rows=res.rows.map(r=>cols.map(c=>{const v=r[c.key]; if(v==null||v==='')return ''; if(c.type==='kr0')return Math.round(+v); if(c.type==='kr'||c.type==='num')return Math.round((+v)*100)/100; if(c.type==='pct')return Math.round((+v)*10)/10; return v;}));
  const foot=res.footer?[cols.map(c=>{const v=res.footer[c.key]; if(v==null||v==='')return ''; if(c.type==='kr0')return Math.round(+v); if(c.type==='kr'||c.type==='num')return Math.round((+v)*100)/100; if(c.type==='pct')return Math.round((+v)*10)/10; return v;})]:[];
  return {title:rep.name, header, rows, foot};
}
function exportCSV(){
  const m=repMatrix();
  const esc=v=>{ if(typeof v==='number')return String(v).replace('.',','); const s=String(v==null?'':v); return /[";\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const lines=[m.header,...m.rows,...m.foot].map(r=>r.map(esc).join(';'));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  downloadBlob(blob, repFilename('csv'));
}
function exportXLSX(){
  const m=repMatrix();
  const aoa=[[m.title],[],m.header,...m.rows,...m.foot];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=m.header.map((h,i)=>({wch:Math.max(String(h).length+2, 12)}));
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Rapport');
  XLSX.writeFile(wb, repFilename('xlsx'));
}
function exportPDF(){ window.print(); }
function exportUHT(){ // DST "UHT Excel Line": Oprindelsesland | Tjenestekode | Indtægter | Udgifter · 1 headerlinje · hele kr.
  const {res}=REP_STATE.last;
  const header=['Oprindelsesland','Tjenestekode','Indtægter','Udgifter'];
  const valid=res.rows.filter(r=>r.land && r.land!=='(mangler)');
  const skl=res.rows.filter(r=>!r.land || r.land==='(mangler)').reduce((s,r)=>s+(+r.rejser||0),0);
  const rows=valid.map(r=>[r.land, r.kode||'', Math.round(+r.ind||0), Math.round(+r.udg||0)]);
  const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
  ws['!cols']=[{wch:14},{wch:12},{wch:14},{wch:14}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'UHT');
  XLSX.writeFile(wb, `UHT_Virk_${REP_STATE.from}_${REP_STATE.to}.xlsx`);
  if(skl) alert('OBS: '+skl+' rejse(r) uden gyldig landekode blev udeladt af filen. Ret destinationen på rejsen, eller tilføj landet i UHT_LAND-listen.');
}
function downloadBlob(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1500); }

async function setStatus(id,s){ await db.from('trips').update({status:s}).eq('id',id); viewTrip(id); }
async function setStatusSel(id,s){
  if(!s) return;
  if(s==='canx'){ alert('Brug "Afbestil rejse…" for at afbestille — så håndteres penge, elementer og kundebekræftelse korrekt.'); return viewTrip(id); }
  const t=window.TRIP;
  if(t && t.status==='canx' && !confirm('Fortryd afbestillingen og sæt status til "'+STATUS_LABELS[s]+'"?\n\nOBS: registrerede refusioner/kreditter/tab nulstilles IKKE automatisk — gennemgå posteringerne bagefter.')) return viewTrip(id);
  const patch={status:s};
  if(t && t.status==='canx'){ patch.cancelled_at=null; patch.retained_dkk=0; patch.loss_dkk=0; patch.refund_dkk=0; }
  await db.from('trips').update(patch).eq('id',id); viewTrip(id);
}

// ═══ AFBESTILLINGS-FLOW ═══════════════════════════════════════════════════
// Gældende afbestillingsvilkår (Generelle vilkår §6.2). Redigér her hvis vilkårene ændres.
const AFBESTIL_VILKAAR = `Afbestilling mere end 60 dage før afrejse: afbestillingsgebyret svarer til det beløb, der er indbetalt eller forfaldent på afbestillingstidspunktet (typisk depositum, men kan være rejsens fulde pris afhængigt af leverandørens betingelser). Afbestilling færre end 60 dage før afrejse: afbestillingsgebyret er i alle tilfælde 100 %. Ved uundgåelige og ekstraordinære omstændigheder (fx krigshandlinger) på destinationen kan rejsen afbestilles gebyrfrit senest 14 dage før afrejse med fuld refusion. Ovenstående gælder medmindre andet er anført i ordrebekræftelsen.`;
const CX_OUTCOMES = {
  ikke_betalt:'Ikke betalt til leverandør — intet tab',
  kreditnota:'Betalt → kreditnota fra leverandør',
  refunderet:'Betalt → penge retur fra leverandør',
  tabt:'Betalt → tabt (inden for frist / ikke-refunderbart)'
};
const daysTo = d => d? Math.round((new Date(d)-new Date(today()))/86400000):null;
function cxNum(id){ const v=parseFloat((document.getElementById(id)||{}).value); return isNaN(v)?0:v; }

function openCancel(id){
  const t=window.TRIP, els=window.ELS||[];
  const dtd=daysTo(t.departure_date);
  const regel = dtd===null?'ukendt afrejsedato': dtd<60?`${dtd} dage til afrejse → gebyr 100 %`:`${dtd} dage til afrejse → gebyr = indbetalt/forfaldent (typisk depositum)`;
  const paidGuess = t.deposit_amount||'';
  const d=$('#eldlg');
  d.innerHTML=`<h2 class="pf" style="font-weight:600;margin-top:0;color:var(--bad)">Afbestil rejse · ${t.ref_no}</h2>
  <p class="muted" style="margin:0 0 10px">${kName(t)} · afrejse ${fmtDY(t.departure_date)} · <b>${regel}</b></p>
  <div class="row"><div style="flex:2"><label>Årsag til afbestilling</label><input id="cx_reason" placeholder="fx kundens ønske / sygdom / krigsændring"></div>
    <div><label style="display:flex;gap:6px;align-items:center;margin-top:22px"><input type="checkbox" id="cx_war" onchange="cxRecalc()"> Gebyrfri (krig/ekstraordinært)</label></div></div>

  <h3 style="margin:14px 0 4px;color:var(--forest)">Elementer</h3>
  <div style="font-size:11px" class="muted">Vælg hvad der sker med hvert element. Beløb = købspris i DKK vi har/havde hos leverandøren.</div>
  <table style="width:100%;font-size:12px;margin:6px 0 4px"><tr><th></th><th style="text-align:left">Element</th><th style="text-align:left">Udfald</th><th class="r">Beløb DKK</th></tr>
  ${els.map((e,i)=>{
    const amt = Math.round(e.buy_amount_dkk|| (e.buy_amount&&(e.buy_currency==='DKK')?e.buy_amount:0) ||0);
    const already=['cx','refunderet'].includes(e.status);
    return `<tr>
      <td><input type="checkbox" id="cx_el_${i}" ${already?'':'checked'} onchange="cxRecalc()"></td>
      <td>${EL_TYPES[e.element_type]||e.element_type}: ${e.description}<div class="muted" style="font-size:10px">${e.suppliers?e.suppliers.name:'(ingen leverandør)'} · nu: ${e.status}</div></td>
      <td><select id="cx_out_${i}" onchange="cxRecalc()">${Object.entries(CX_OUTCOMES).map(([k,v])=>`<option value="${k}" ${k==='ikke_betalt'?'selected':''}>${v}</option>`).join('')}</select></td>
      <td class="r"><input id="cx_amt_${i}" type="number" step="0.01" value="${amt||''}" style="width:110px;text-align:right" oninput="cxRecalc()"></td>
    </tr>`;}).join('')||'<tr><td colspan="4" class="muted">Ingen elementer registreret.</td></tr>'}
  </table>

  <h3 style="margin:14px 0 4px;color:var(--forest)">Kundens penge</h3>
  <div class="row">
    <div><label>Indbetalt af kunde (DKK)</label><input id="cx_paid" type="number" step="0.01" value="${paidGuess}" oninput="cxRecalc()"></div>
    <div><label>Afbestillingsgebyr / tilbageholdes (DKK)</label><input id="cx_fee" type="number" step="0.01" oninput="cxManualFee=true;cxRecalc()"></div>
    <div><label>Til refusion til kunde (DKK)</label><input id="cx_refund" type="number" step="0.01" oninput="cxManualRefund=true;cxRecalc()"></div>
  </div>
  <label style="display:flex;gap:6px;align-items:center;font-size:12px;margin-top:6px"><input type="checkbox" id="cx_bookpaid" checked> Opret kundens indbetaling som postering (hvis den ikke allerede er bogført)</label>
  <div id="cx_summary" class="muted" style="font-size:11.5px;margin:8px 0"></div>

  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn danger" onclick="doCancel('${t.id}')">Bekræft afbestilling</button>
    <button class="btn ghost" onclick="document.getElementById('eldlg').close()">Fortryd</button>
    <span class="muted" style="font-size:11px;align-self:center">Sætter status = Afbestilt, opdaterer elementer, opretter kreditter/refusion, opgaver og en bekræftelse til kunden.</span>
  </div>
  <div class="err" id="cxerr"></div>`;
  window.cxManualFee=false; window.cxManualRefund=false; window.CX_N=els.length;
  d.showModal(); cxRecalc();
}
function cxRecalc(){
  const t=window.TRIP, n=window.CX_N||0, dtd=daysTo(t.departure_date);
  let loss=0, credit=0, refundSup=0;
  for(let i=0;i<n;i++){ const on=(document.getElementById('cx_el_'+i)||{}).checked; if(!on)continue;
    const out=(document.getElementById('cx_out_'+i)||{}).value; const a=cxNum('cx_amt_'+i);
    if(out==='tabt')loss+=a; else if(out==='kreditnota')credit+=a; else if(out==='refunderet')refundSup+=a; }
  const paid=cxNum('cx_paid');
  if(!window.cxManualFee){ // auto-gebyr efter vilkår
    let fee = (document.getElementById('cx_war')||{}).checked ? 0 : (dtd!==null && dtd<60 ? paid : (t.deposit_amount||Math.min(paid,loss)||0));
    fee=Math.min(fee,paid); const f=document.getElementById('cx_fee'); if(f)f.value=fee?Math.round(fee*100)/100:0;
  }
  const fee=cxNum('cx_fee');
  if(!window.cxManualRefund){ const r=document.getElementById('cx_refund'); if(r)r.value=Math.max(0,Math.round((paid-fee)*100)/100); }
  const refund=cxNum('cx_refund');
  const net=fee-loss;
  const s=document.getElementById('cx_summary');
  if(s)s.innerHTML=`Tilbageholdt fra kunde (indtægt): <b>${fmtKr(fee)}</b> · Til refusion: <b>${fmtKr(refund)}</b> · Leverandørtab: <b>${fmtKr(loss)}</b> · Kreditnotaer: <b>${fmtKr(credit)}</b> · Leverandørrefusion: <b>${fmtKr(refundSup)}</b><br><b style="color:${net>=0?'var(--ok)':'var(--bad)'}">Nettoresultat af afbestilling: ${fmtKr(net)} DKK</b> (tilbageholdt − tab)`;
}
async function doCancel(id){
  const t=window.TRIP, els=window.ELS||[], n=els.length;
  const err=$('#cxerr'); err.textContent='';
  const reason=($('#cx_reason').value||'').trim();
  const war=$('#cx_war').checked;
  const paid=cxNum('cx_paid'), fee=cxNum('cx_fee'), refund=cxNum('cx_refund');
  if(!confirm(`Afbestil ${t.ref_no}?\n\nTilbageholdt: ${fmtKr(fee)} · Refusion til kunde: ${fmtKr(refund)} DKK`)) return;
  try{
    let loss=0; const creditRows=[]; const taskRows=[]; const cur=t.customer_currency||'DKK';
    for(let i=0;i<n;i++){ const e=els[i]; if(!(document.getElementById('cx_el_'+i)||{}).checked) continue;
      const out=document.getElementById('cx_out_'+i).value; const a=cxNum('cx_amt_'+i);
      const newStatus = out==='refunderet' ? 'refunderet' : 'cx';
      await db.from('trip_elements').update({status:newStatus}).eq('id',e.id);
      const supId=e.financial_supplier_id||e.supplier_id||null;
      if(out==='kreditnota' && supId && a>0){ creditRows.push({supplier_id:supId, origin_trip_id:id, currency:'DKK', amount:a, note:`Kreditnota – afbestilt ${t.ref_no}: ${e.description}`}); }
      if(out==='tabt') loss+=a;
      taskRows.push({trip_id:id, element_id:e.id, task_type:'afbestil_element', title:`Afbestil hos leverandør: ${e.description}${e.suppliers?' ('+e.suppliers.name+')':''}`, assignee:t.owner||null, due_date:today(), auto_generated:true});
      if(supId && out!=='ikke_betalt'){ taskRows.push({trip_id:id, element_id:e.id, task_type:'kredit_refusion', title:`Tjek ${out==='kreditnota'?'kreditnota':out==='refunderet'?'refusion':'evt. refusion'} hos ${e.suppliers?e.suppliers.name:'leverandør'}: ${e.description}`, assignee:t.owner||null, due_date:today(), auto_generated:true}); }
    }
    if(creditRows.length){ const {error}=await db.from('supplier_credits').insert(creditRows); if(error)throw new Error('kreditnota: '+error.message); }

    // Kundens indbetaling (rekonstruktion) + refusion ud
    if($('#cx_bookpaid').checked && paid>0){
      const {data:pin,error:e1}=await db.from('payments').insert({direction:'ind',status:'betalt',amount:paid,currency:cur,fx_rate:1,amount_dkk:paid,bank_account:'(rekonstruktion)',method:'rekonstruktion',payment_ref:t.ref_no+'-IND',payment_date:today(),in_type:'delbetaling',note:'Rekonstrueret indbetaling ifm. afbestilling'}).select('id').single();
      if(e1)throw new Error('indbetaling: '+e1.message);
      await db.from('payment_allocations').insert({payment_id:pin.id,trip_id:id,amount_dkk:paid});
    }
    if(refund>0){
      const {data:pout,error:e2}=await db.from('payments').insert({direction:'ud',status:'aaben',amount:refund,currency:cur,fx_rate:1,amount_dkk:refund,bank_account:'',method:'refusion',payment_ref:t.ref_no+'-REF',payment_date:today(),in_type:'refund_til_kunde',note:'Refusion til kunde – afbestilling'}).select('id').single();
      if(e2)throw new Error('refusion: '+e2.message);
      await db.from('payment_allocations').insert({payment_id:pout.id,trip_id:id,amount_dkk:refund});
      taskRows.push({trip_id:id, task_type:'refusion_udbetaling', title:`Udbetal refusion til kunde: ${fmtKr(refund)} DKK`, assignee:t.owner||null, due_date:today(), auto_generated:true});
    }
    taskRows.push({trip_id:id, task_type:'afbestillingsbekraeftelse', title:'Send afbestillingsbekræftelse til kunde', assignee:t.owner||null, due_date:today(), auto_generated:true});
    if(taskRows.length) await db.from('tasks').insert(taskRows);

    await db.from('trips').update({status:'canx', cancelled_at:today(), cancel_reason:reason||(war?'Krig/ekstraordinært':null), retained_dkk:fee, loss_dkk:loss, refund_dkk:refund}).eq('id',id);

    $('#eldlg').close();
    if(confirm(`Afbestilt ✓\n\nTilbageholdt ${fmtKr(fee)} · tab ${fmtKr(loss)} · refusion ${fmtKr(refund)} DKK.\nOpgaver oprettet.\n\nÅbn afbestillingsbekræftelse til kunden nu?`)){
      genAfbestilDoc(t,{paid,fee,refund,reason:reason||(war?'Krig/ekstraordinært':''),war});
    }
    viewTrip(id);
  }catch(ex){ err.textContent='Fejl: '+ex.message; }
}

function tnum(x){ return (x===null||x===undefined||x==='')?null:(+x); }
function parseBudgetFromText(t){
  if(!t) return null;
  const re=/((?:\d{1,3}[.\s]){1,3}\d{3}|\d{4,7})/g; let m, best=null, bestPP=false;
  while((m=re.exec(t))){
    const val=parseInt(m[1].replace(/[.\s]/g,''),10);
    if(isNaN(val)||val<5000||val>3000000) continue;
    const around=t.slice(Math.max(0,m.index-16), Math.min(t.length, re.lastIndex+20));
    if(!/kr|nok|dkk|kroner|budget|budsjett|maks|,-|per|pr\.?\s*person|pr\.?\s*pers/i.test(around)) continue;
    const pp=/pr\.?\s*person|per\s*person|per\s*pers|pr\s*pers|\/\s*person|\bpp\b|per hode/i.test(around);
    if(best==null || (pp&&!bestPP) || (pp===bestPP && val>best)){ best=val; bestPP=pp; }
  }
  return best==null?null:{amount:best, perPerson:bestPP};
}
function luxLevel(t){
  if(!t) return 'standard';
  if(/ultra|privat\s*pool|pool\s*villa|overwater|vandvilla|water\s*villa|eksklusiv|verdensklasse|5\s*\*\s*\*|ultimat/i.test(t)) return 'ultra';
  if(/luksus|luksuri|5\s*stjerner|5\s*\*|all\s*inclusive|romantisk|honeymoon|bryllup|premium/i.test(t)) return 'premium';
  return 'standard';
}
function triage(l){
  const pax=(tnum(l.adults)||0)+(tnum(l.kids)||0) || (tnum(l.adults)||0);
  const text=((l.wishes||'')+' '+(l.travel_wishes||'')+' '+(l.highlights||'')).toLowerCase();
  const pb=parseBudgetFromText(text);
  let perPerson=null,total=null,src=null;
  if(tnum(l.max_budget)!=null){ perPerson=+l.max_budget; src='felt: budget pr. person'; }
  else if(pb){ if(pb.perPerson){perPerson=pb.amount;} else {total=pb.amount;} src='læst i fritekst'; }
  else if(tnum(l.est_value)!=null){ total=+l.est_value; src='felt: budget (samlet)'; }
  if(perPerson==null && total!=null && pax>0) perPerson=Math.round(total/pax);
  if(total==null && perPerson!=null && pax>0) total=perPerson*pax;
  const tier = perPerson==null?null:(perPerson<20000?'low':perPerson<40000?'mid':'good');
  const lux=luxLevel(text);
  const kids=tnum(l.kids)||0;
  const musts=[
    ['navn', !!l.contact_name],
    ['e-mail/telefon', !!(l.contact_email||l.contact_phone)],
    ['afrejselufthavn', !!l.departure_airport],
    ['datoer', !!(l.earliest_departure||l.departure_date)],
    ['nætter', tnum(l.nights)!=null],
    ['rejsende', tnum(l.adults)!=null],
    ['børnealdre', !(kids>0) || !!l.child_ages],
    ['destination', destList(l.destination).length>0],
    ['budget', perPerson!=null||total!=null],
  ];
  const missing=musts.filter(m=>!m[1]).map(m=>m[0]);
  const completeness=Math.round(100*(musts.length-missing.length)/musts.length);
  let score=0;
  score += tier==='good'?40:tier==='mid'?25:tier==='low'?10:0;
  score += Math.round(completeness*0.2);
  score += lux==='ultra'?20:lux==='premium'?14:8;
  const nn=tnum(l.nights)||0; score += nn>=7?10:nn>=4?6:nn>=1?3:0;
  return {perPerson,total,tier,lux,pax,missing,complete:missing.length===0,completeness,score,src};
}

function stageDurations(l, acts){
  const tl=[{stage:l.stage&&acts.length?null:(l.stage||'new_lead'), at:null}]; // placeholder
  // byg tidslinje: start i new_lead ved created_at, dernæst hvert trinskift
  const seq=[{stage:'new_lead', at:new Date(l.created_at||Date.now()).getTime()}];
  acts.filter(a=>a.type==='system'&&a.stage).forEach(a=>seq.push({stage:a.stage, at:new Date(a.occurred_at).getTime()}));
  seq.sort((a,b)=>a.at-b.at);
  const dur={}; const now=Date.now();
  for(let i=0;i<seq.length;i++){ const end=i+1<seq.length?seq[i+1].at:now; dur[seq[i].stage]=(dur[seq[i].stage]||0)+Math.max(0,end-seq[i].at); }
  const current=seq.length?seq[seq.length-1].stage:(l.stage||'new_lead');
  const enteredCurrentAt=seq.length?seq[seq.length-1].at:new Date(l.created_at||Date.now()).getTime();
  return {dur, current, enteredCurrentAt};
}
function renderStageBar(l, acts){
  const bar=document.getElementById('l_stagebar'); if(!bar) return;
  const {dur,current,enteredCurrentAt}=stageDurations(l, acts);
  const curIdx=Math.max(0, LEAD_STAGES.findIndex(s=>s[0]===current));
  bar.innerHTML=LEAD_STAGES.map(([key,label],i)=>{
    const days=Math.floor((dur[key]||0)/86400000);
    const cls=i===curIdx?'cur':(i<curIdx?'done':'todo');
    return `<div class="sseg ${cls}" title="${escH(label)} — ${dagOrd(days)}" onclick="setLeadStage('${l.id||''}',${i})"><span class="d">${days}d</span><span class="l">${escH(STAGE_SHORT[key]||label)}</span></div>`;
  }).join('');
  const total=daysSince(l.created_at); const rott=daysSince(enteredCurrentAt);
  const sm=document.getElementById('l_smeta'); if(sm) sm.innerHTML=`<span>Klik et trin for at flytte henvendelsen</span><span><b>${dagOrd(total)}</b> i alt · <b>${dagOrd(rott)}</b> på nuværende trin</span>`;
}

  const A=acts||[]; window._curActs=A;
  renderStageBar(l, A);
  // interne noter (kun internt_notat), nyeste øverst
  const notes=A.filter(a=>a.type==='internt_notat').sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at));
  const nb=document.getElementById('l_notes');
  if(nb) nb.innerHTML = notes.length?notes.map(n=>`<li class="n"><div class="h"><b>${escH(n.actor||'—')}</b> · ${fmtDT(n.occurred_at)}</div><div class="t">${escH(n.body||'').replace(/\n/g,'<br>')}</div></li>`).join('')
    : '<li class="muted" style="font-size:11.5px;color:var(--mut)">Ingen interne noter endnu.</li>';
  // historik: alt undtagen interne noter, nyeste øverst
  const hist=A.filter(a=>a.type!=='internt_notat').sort((a,b)=>new Date(b.occurred_at)-new Date(a.occurred_at));
  const hb=document.getElementById('l_hist');
  if(hb) hb.innerHTML = hist.length?hist.map(a=>{
      const label=a.type==='system'?(a.stage?'Flyttet til «'+escH(LEAD_STAGE_LABEL[a.stage]||a.stage)+'»':escH(a.body||'System')):escH(ACT_LABEL[a.type]||a.type);
      const showBody=a.type!=='system'&&a.body;
      return `<li class="e ${a.is_touchpoint?'tp':''}"><span class="dot"></span><div class="h"><b>${label}</b>${a.is_touchpoint?'<span class="tag tp">Berøringspunkt</span>':'<span class="tag int">Internt</span>'}</div><div class="w">${fmtDT(a.occurred_at)} · ${escH(a.actor||'')}</div>${showBody?`<div class="t">${escH(a.body).replace(/\n/g,'<br>')}</div>`:''}</li>`;
    }).join('') : '<li style="font-size:11.5px;color:var(--mut)">Ingen hændelser endnu.</li>';
  // stats
  const tp=A.filter(a=>a.is_touchpoint).length;
  const sb=document.getElementById('l_stats');
  if(sb) sb.innerHTML=`<div class="st"><div class="n">${tp}</div><div class="l">berøringspunkter med kunden</div></div>
    <div class="st"><div class="n">${dagOrd(daysSince(l.created_at))}</div><div class="l">siden modtaget</div></div>

async function setLeadStage(id, idx){
  const [key]=LEAD_STAGES[idx];
  const hid=document.getElementById('l_stage'); if(hid) hid.value=key;
  if(!id){ const l0={id:'',stage:key,created_at:new Date().toISOString()}; renderStageBar(l0,[]); return; }
  if(key==='confirmed'){ const l=(window._leads||[]).find(x=>x.id===id); if(l) return convertLeadToTrip({...l, ...leadFormData()}); }
  const {error}=await db.from('leads').update({stage:key}).eq('id',id);
  if(error){ alert(error.message); return; }
  window._leadDirty=true;
  const l=(window._leads||[]).find(x=>x.id===id); if(l) l.stage=key;
  refreshLeadActs(id, l);
}

// Auto-gem: kaldes når man forlader et felt — intet "Gem" at huske på
async function autoSaveLead(){
  const rec=leadFormData();
  if(window._curLeadId){
    const {error}=await db.from('leads').update(rec).eq('id',window._curLeadId);
    if(error){ showLeadErr(error); return; }
    showLeadErr({message:''}); window._leadDirty=true;
    const l=(window._leads||[]).find(x=>x.id===window._curLeadId); if(l) Object.assign(l,rec);
    flashSaved();
  } else {
    // ny henvendelse: opret først når der er reelt indhold
    if(!(rec.contact_name||rec.contact_email||rec.destination||(rec.title&&rec.title!=='Henvendelse'))) return;
    const {data,error}=await db.from('leads').insert(rec).select(LEAD_FIELDS).single();
    if(error){ showLeadErr(error); return; }
    (window._leads=window._leads||[]).unshift(data); window._leadDirty=true;
    if(window._leadDlg){ window._leadDlg.close(); window._leadDlg.remove(); window._leadDlg=null; }
    editLead(data.id); flashSaved();
  }
}

// ═══ BRUGERE — roller & rettigheder (kun manage_users) ═══════════════════
// Effektive rettigheder = rolle-standard (roles.permissions) + individuelle
// undtagelser (team_members.permission_overrides). Databasen håndhæver det
// samme via public.my_permissions()/has_perm() og RLS på team_members/roles.
const PERM_DEFS = [
  ['economy','Indtjening & økonomital','Omsætning, pipeline, ÅTD, "omdannet indtægt" og pengetal under Markedsføring'],
  ['finance','Økonomi-fanen','Leverandørbetalinger, bankafstemning og flyfakturaer'],
  ['reports','Rapporter','Perioderapporter og nøgletal — indeholder økonomital'],
  ['leads','Henvendelser','Lead-modulet (indbakken fra Pipedrive-afløseren)'],
  ['manage_users','Brugeradmin','Kan oprette brugere og ændre roller & rettigheder']
];
function effPerms(u){
  const r=(window.ROLES||[]).find(x=>x.role_key===u.role);
  return Object.assign({}, (r&&r.permissions)||{}, u.permission_overrides||{});
}
async function viewUsers(){
  if(!hasPerm('manage_users')) return noAccess('users');
  navTo('users');
  app.innerHTML = '<div class="pagehead"><h2>Brugere</h2></div><div class="card">Henter…</div>';
  const { data: users, error } = await db.from('team_members').select('*').order('name');
  if(error){ app.innerHTML = '<div class="card"><p class="muted">Kunne ikke hente brugere: '+error.message+'</p></div>'; return; }
  window._USERS = users||[];
  // Vis et netop genereret engangskodeord OVEN PÅ den genindlæste liste (ellers viskes det væk)
  const pwCard = window._LASTPW ? `<div class="card" style="border-color:var(--gold)"><h3>Login ${window._LASTPW.action} for ${window._LASTPW.email}</h3>
     <p style="margin:0 0 6px">Engangskodeord: <b style="font-size:16px;letter-spacing:1px">${window._LASTPW.pw}</b></p>
     <p class="mini muted" style="margin:0">Giv det til brugeren ad en sikker kanal (ikke mail). De logger ind med det og skifter selv kodeord under «Skift kodeord». Kodeordet vises kun her, én gang.</p></div>` : '';
  window._LASTPW = null;
  const rows = window._USERS.map(u=>{
    const eff = effPerms(u), isMe = u.email===window.MYEMAIL;
    const roleOpts = (window.ROLES||[]).map(r=>`<option value="${r.role_key}" ${u.role===r.role_key?'selected':''}>${r.label}</option>`).join('');
    const cells = PERM_DEFS.map(([k,lbl,desc])=>{
      const ovr = u.permission_overrides && (k in u.permission_overrides);
      const lock = isMe && k==='manage_users'; // du kan ikke fjerne din egen admin-adgang
      return `<label class="permcell${ovr?' ovr':''}" title="${desc}"><input type="checkbox" ${eff[k]?'checked':''} ${lock?'disabled':''} onchange="usrTogglePerm('${u.email}','${k}',this.checked)">${lbl}</label>`;
    }).join('');
    return `<div class="usr-row${u.active===false?' inactive':''}">
      <div class="usr-head"><b>${u.name}</b><span class="ini">${u.initials}</span><span class="muted">${u.email}</span>
        <select onchange="usrSetRole('${u.email}',this.value)" ${isMe?'disabled title="Du kan ikke ændre din egen rolle"':''}>${roleOpts}</select></div>
      <div class="usr-perms">${cells}</div>
      <div class="usr-meta">
        ${u.permission_overrides&&Object.keys(u.permission_overrides).length?`<a href="#" style="color:var(--gold)" onclick="usrClearOverrides('${u.email}');return false">Nulstil til rollens standard</a>`:'<span>Følger rollens standard</span>'}
        ${isMe?'<span>· det er dig</span>':`· <a href="#" style="color:var(--forest)" onclick="usrLogin('${u.email}');return false">Opret/nulstil login</a> · <a href="#" onclick="usrToggleActive('${u.email}',${u.active===false});return false">${u.active===false?'Genaktivér bruger':'Deaktivér bruger'}</a>`}
      </div></div>`;
  }).join('');
  const roleCards = (window.ROLES||[]).map(r=>`<div class="rolecard"><b>${r.label}</b> <span class="muted">— ${r.description||''}</span>
    <div class="pl">${PERM_DEFS.map(([k,lbl])=>`<span class="${(r.permissions||{})[k]?'y':'n'}">${lbl}</span>`).join('')}</div></div>`).join('');
  app.innerHTML = `
  <div class="pagehead"><h2>Brugere</h2><span class="sub">roller & rettigheder · ændringer gælder fra næste login/genindlæsning</span></div>
  ${pwCard}
  <div class="grid g2">
    <div>
      <div class="card"><h3>Teamet <span class="r muted">${window._USERS.length} brugere</span></h3>${rows}</div>
      <div class="card"><h3>Tilføj bruger</h3>
        <div class="grid g4" style="gap:8px">
          <div><label>Navn</label><input id="nu_name" placeholder="Fornavn Efternavn"></div>
          <div><label>E-mail</label><input id="nu_email" placeholder="xx@maldivia.dk"></div>
          <div><label>Initialer</label><input id="nu_ini" placeholder="ABC" maxlength="4" style="text-transform:uppercase"></div>
          <div><label>Rolle</label><select id="nu_role">${(window.ROLES||[]).map(r=>`<option value="${r.role_key}" ${r.role_key==='saelger'?'selected':''}>${r.label}</option>`).join('')}</select></div>
        </div>
        <div class="dlg-actions"><button class="btn" onclick="usrAdd()">Opret bruger</button><span id="nu_err" class="muted"></span></div>
        <p class="mini muted" style="margin:10px 0 0">Når du opretter en bruger, oprettes deres login automatisk, og du får vist et <b>engangskodeord</b> — giv det til brugeren, som selv skifter det under «Skift kodeord» efter første login. «Opret/nulstil login» på en eksisterende bruger gør det samme (nyt engangskodeord).</p></div>
    </div>
    <div>
      <div class="card"><h3>Rollernes standard-rettigheder</h3>${roleCards}
        <p class="mini muted" style="margin:8px 0 0">En bruger følger sin rolles standard. Krydser du noget af/på direkte på brugeren, gemmes det som en individuel <b>undtagelse</b> (gylden ring), der vinder over rollen.</p></div>
      <div class="card"><h3>Morgenbrief pr. bruger</h3>
        <p class="mini" style="line-height:1.6">Briefens fælles dele (nyheder, opgaver, firmapuls) vises for alle. <b>Mail-sektionen</b> vises kun for den bruger, hvis postkasse den er læst fra — lige nu Wendies. Rasmus og Emilie kobler deres egen Outlook på via en planlagt opgave i deres egen Claude, som hver morgen skriver en personlig række (for_email = deres e-mail) i daily_briefing — se guiden «Personlig morgenbrief — opsætning» i projektmappen.</p></div>
    </div>
  </div>`;
}
async function usrTogglePerm(email,k,val){
  const u=(window._USERS||[]).find(x=>x.email===email); if(!u) return;
  const r=(window.ROLES||[]).find(x=>x.role_key===u.role);
  const def=!!(((r&&r.permissions)||{})[k]);
  const ovr=Object.assign({},u.permission_overrides||{});
  if(val===def) delete ovr[k]; else ovr[k]=val;
  const {error}=await db.from('team_members').update({permission_overrides:ovr}).eq('email',email);
  if(error) alertUsr(error); else viewUsers();
}
async function usrSetRole(email,role){
  const {error}=await db.from('team_members').update({role}).eq('email',email);
  if(error) alertUsr(error); else viewUsers();
}
async function usrClearOverrides(email){
  const {error}=await db.from('team_members').update({permission_overrides:{}}).eq('email',email);
  if(error) alertUsr(error); else viewUsers();
}
async function usrToggleActive(email,makeActive){
  if(email===window.MYEMAIL) return;
  const {error}=await db.from('team_members').update({active:!!makeActive}).eq('email',email);
  if(error) alertUsr(error); else viewUsers();
}
async function usrAdd(){
  const name=$('#nu_name').value.trim(), email=$('#nu_email').value.trim().toLowerCase(), ini=$('#nu_ini').value.trim().toUpperCase(), role=$('#nu_role').value;
  const err=$('#nu_err');
  if(!name||!email.includes('@')||ini.length<2){ err.textContent='Udfyld navn, gyldig e-mail og initialer.'; return; }
  const {error}=await db.from('team_members').insert({name,email,initials:ini,role,permission_overrides:{},active:true});
  if(error){ err.textContent=error.message; return; }
  await usrLogin(email);   // opret login med det samme — genindlæser listen og viser engangskodeordet
}
// Engangskodeord: læsbart men tilfældigt (fx Mal-K7RC-P2WX)
function genPw(){
  const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', r=new Uint8Array(8);
  crypto.getRandomValues(r);
  const s=[...r].map(x=>A[x%A.length]).join('');
  return 'Mal-'+s.slice(0,4)+'-'+s.slice(4);
}
async function usrLogin(email){
  const pw = genPw();
  const {data:{session:s}} = await db.auth.getSession();
  if(!s){ alertUsr({message:'Du er ikke logget ind.'}); return; }
  let j;
  try{
    const r = await fetch(SB_URL+'/functions/v1/opret-login',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.access_token},
      body:JSON.stringify({email, password:pw})
    });
    j = await r.json();
  }catch(e){ alertUsr({message:'Kunne ikke nå opret-login: '+e.message}); return; }
  if(!j || !j.ok){ alertUsr({message:(j&&j.error)||'Ukendt fejl fra opret-login'}); return; }
  window._LASTPW = {email, pw, action:j.action};
  await viewUsers();               // genindlæs listen — kodeord-kortet vises øverst via _LASTPW
  window.scrollTo({top:0,behavior:'smooth'});
}
function alertUsr(error){ app.insertAdjacentHTML('afterbegin','<div class="card" style="border-color:var(--bad)"><p style="color:var(--bad);margin:0">Kunne ikke gemme: '+error.message+'</p></div>'); }

init();
</script>
